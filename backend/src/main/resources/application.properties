# Server Configuration
server.port=8080
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/learnhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Tiger
# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# JWT Configuration
jwt.secret=learnHubSecretKeyForJWTTokenGeneration2024VerySecureKey123456789
jwt.expiration=86400000
# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# Logging
logging.level.org.springframework.security=INFO
logging.level.com.learnhub=INFO

# DEV
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

